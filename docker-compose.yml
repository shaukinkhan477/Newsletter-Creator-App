services:
  frontend:
    build:
      context: ./newsLetterCreatorApp
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - newsletter-network

  backend:
    build:
      context: ./newsLetter-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/newsletterAppDB
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET before running docker compose}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CLIENT_URL: http://localhost:8080
      CORS_ORIGIN: http://localhost:8080
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - newsletter-network
    depends_on:
      mongo:
        condition: service_started

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - newsletter-network

volumes:
  mongo-data:

networks:
  newsletter-network:
    driver: bridge
